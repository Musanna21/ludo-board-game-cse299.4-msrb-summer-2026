<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ludo Arena - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Include Socket.io Client Library for Member 3 Integration Testing -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen font-sans">
  <div class="max-w-md w-full mx-4 bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
    <h2 class="text-2xl font-bold mb-6 text-center">Welcome Back</h2>
    
    <form class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1">Email Address</label>
        <input type="email" placeholder="name@domain.com" class="w-full p-3 bg-slate-700 rounded-xl border border-slate-600 focus:outline-none focus:border-blue-500 text-white" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1">Password</label>
        <input type="password" placeholder="••••••••" class="w-full p-3 bg-slate-700 rounded-xl border border-slate-600 focus:outline-none focus:border-blue-500 text-white" required>
      </div>
      
      <!-- Forgot Password Hook Layout Trigger -->
      <div class="text-right">
        <button type="button" onclick="toggleForgotPasswordModal(true)" class="text-xs text-blue-400 hover:underline">Forgot Password?</button>
      </div>

      <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 transition font-semibold rounded-xl shadow-md mt-4">
        Sign In
      </button>
    </form>
  </div>

  <!-- Forgot Password Popup Overlay Template -->
  <div id="forgotPasswordModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4">
    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 max-w-sm w-full">
      <h3 class="text-xl font-bold mb-2">Reset Password</h3>
      <p class="text-sm text-slate-400 mb-4">Enter your email and we'll send a password recovery token link.</p>
      <input type="email" placeholder="your-email@domain.com" class="w-full p-3 bg-slate-700 rounded-xl border border-slate-600 mb-4 focus:outline-none focus:border-blue-500">
      <div class="flex gap-2">
        <button onclick="toggleForgotPasswordModal(false)" class="w-1/2 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">Cancel</button>
        <button class="w-1/2 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-medium">Send Link</button>
      </div>
    </div>
  </div>

  <script>
    function toggleForgotPasswordModal(show) {
      const modal = document.getElementById('forgotPasswordModal');
      modal.className = show ? 'fixed inset-0 bg-black/70 flex items-center justify-center p-4' : 'hidden';
    }

    // Live Socket Connection Prototype Hook (Testing Member 3's Handshake)
    const socket = io('http://localhost:5000');
    socket.on('connect', () => {
      console.log('⚡ UI Connection Verification: Client Socket successfully linked to Node Server!');
      socket.emit('ping_test', { message: "Hello Server! UI Prototype is working." });
    });
    socket.on('pong_test', (data) => {
      console.log('🏆 Server Response:', data.message);
    });
  </script>
</body>
</html>
