<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ludo Arena - Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen font-sans">
  <div class="max-w-md w-full mx-4 bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
    <h2 class="text-2xl font-bold mb-6 text-center">Join the Arena</h2>
    
    <form class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1">Username</label>
        <input type="text" placeholder="Choose a nickname" class="w-full p-3 bg-slate-700 rounded-xl border border-slate-600 focus:outline-none focus:border-blue-500 text-white" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1">Email Address</label>
        <input type="email" placeholder="name@domain.com" class="w-full p-3 bg-slate-700 rounded-xl border border-slate-600 focus:outline-none focus:border-blue-500 text-white" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1">Password</label>
        <input type="password" placeholder="••••••••" class="w-full p-3 bg-slate-700 rounded-xl border border-slate-600 focus:outline-none focus:border-blue-500 text-white" required>
      </div>

      <button type="submit" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 transition font-semibold rounded-xl shadow-md mt-4">
        Register Account
      </button>
    </form>
    
    <p class="text-xs text-center text-slate-500 mt-4">
      Already have an account? <a href="login.html" class="text-blue-400 hover:underline">Log in</a>
    </p>
  </div>
</body>
</html>
