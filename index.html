<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ludo Arena - Welcome</title>
  <!-- Tailwind CSS CDN Boilerplate -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen font-sans">
  <div class="max-w-md w-full mx-4 bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 text-center">
    <h1 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-yellow-400 to-green-500 mb-2">
      LUDO ARENA
    </h1>
    <p class="text-slate-400 mb-8">Real-Time Web Multiplayer Experience</p>

    <div class="space-y-4">
      <a href="login.html" class="block w-full py-3 bg-blue-600 hover:bg-blue-700 transition font-semibold rounded-xl shadow-md">
        Login to Account
      </a>
      <a href="signup.html" class="block w-full py-3 bg-slate-700 hover:bg-slate-600 transition font-semibold rounded-xl border border-slate-600">
        Create an Account
      </a>
      <button id="guestBtn" class="block w-full py-3 bg-emerald-600 hover:bg-emerald-700 transition font-semibold rounded-xl shadow-md">
        Play as Guest
      </button>
    </div>
  </div>
</body>
</html>
